<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://*.outseta.com https://cdnjs.cloudflare.com https://www.googletagmanager.com https://*.google-analytics.com https://connect.facebook.net https://assets.mailerlite.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.outseta.com https://assets.mailerlite.com; font-src 'self' data: https://fonts.gstatic.com https://*.outseta.com https://assets.mailerlite.com; img-src 'self' data: https://*.outseta.com https://*.google-analytics.com https://www.googletagmanager.com https://www.facebook.com https://*.g.doubleclick.net https://assets.mailerlite.com; connect-src 'self' https://*.conwatcher.workers.dev https://*.outseta.com https://*.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://connect.facebook.net https://www.facebook.com https://*.g.doubleclick.net https://*.mailerlite.com; frame-src https://*.outseta.com https://*.mailerlite.com; form-action 'self' https://*.outseta.com https://docs.google.com; base-uri 'self'; object-src 'none'">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — CraftBeacon</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/assets/Favicon-NoBG.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cb-amber-light: #e8b86a;
      --cb-amber: #c8903a;
      --cb-dark: #110f0b;
      --cb-dim: #9a8f82;
      --cb-text: #ede6d8;
      --cb-surface: #1c1914;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cb-dark);
      color: var(--cb-text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { width: 90px; height: auto; margin-bottom: 2rem; opacity: 0.95; }
    .code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 600;
      color: var(--cb-amber);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--cb-text);
      margin-bottom: 1.25rem;
    }
    p {
      font-size: 1.15rem;
      color: var(--cb-dim);
      max-width: 30rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    a.btn {
      text-decoration: none;
      padding: 0.85rem 1.75rem;
      border-radius: 6px;
      font-family: 'Crimson Pro', serif;
      font-size: 1.05rem;
      transition: all 0.2s ease;
    }
    a.btn-primary {
      background: var(--cb-amber);
      color: var(--cb-dark);
      font-weight: 400;
    }
    a.btn-primary:hover { background: var(--cb-amber-light); }
    a.btn-ghost {
      border: 1px solid var(--cb-dim);
      color: var(--cb-text);
    }
    a.btn-ghost:hover { border-color: var(--cb-amber); color: var(--cb-amber); }
  </style>
</head>
<body>
  <img class="logo" src="/assets/Logo-NoBG.png" alt="CraftBeacon" onerror="this.style.display='none'" />
  <div class="code">404</div>
  <h1>This page has drifted out of the beam.</h1>
  <p>The page you're looking for isn't here — it may have moved, or the link may have been mistyped. Let's get you back to steady ground.</p>
  <div class="actions">
    <a class="btn btn-primary" href="/">Back to home</a>
    <a class="btn btn-ghost" href="/resources.html">Author resources</a>
  </div>
</body>
</html>
