<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftBeacon</title>
  <script>
    var o_options = {
      domain: 'the-craft-beacon.outseta.com',
      load: 'auth'
    };
  </script>
  <script src="https://cdn.outseta.com/outseta.min.js"
          data-options="o_options"></script>
</head>
<body>
  <h1>Welcome to CraftBeacon</h1>
  <p>The writing coach for authors who want to do the work themselves.</p>

  <button onclick="Outseta.auth.open({widgetMode: 'login'})">Log In</button>
  &nbsp;&nbsp;
  <button onclick="Outseta.auth.open({widgetMode: 'register'})">Sign Up</button>

  <script>
    // Redirect already-logged-in users straight to the dashboard
    window.addEventListener('load', async function() {
      try {
        await new Promise(function(r) { setTimeout(r, 900); });
        var user = await Outseta.getUser();
        if (user && user.Email) {
          window.location.href = '/dashboard.html';
        }
      } catch(e) {}
    });

    // Redirect immediately after a successful login
    window.addEventListener('load', function() {
      if (window.Outseta) {
        Outseta.on('accessToken.set', function() {
          setTimeout(function() {
            window.location.href = '/dashboard.html';
          }, 500);
        });
      }
    });
  </script>
</body>
</html>
